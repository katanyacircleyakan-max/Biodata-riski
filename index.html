<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Biodata M. Riski Kurniawan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;scroll-behavior:smooth;cursor:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"><circle cx="12" cy="12" r="6" fill="pink"/></svg>') 12 12, auto}
    body{background:#12050f;color:#ffe4f2;overflow-x:hidden}

    /* sakura */
    .sakura{position:fixed;top:-10%;font-size:18px;opacity:.9;animation: fall linear infinite;z-index:0;pointer-events:none}
    @keyframes fall{to{transform:translateY(120vh) rotate(360deg);opacity:.7}}

    header{position:fixed;top:0;width:100%;background:rgba(18,5,15,.75);backdrop-filter:blur(12px);
      padding:14px 20px;display:flex;justify-content:space-between;align-items:center;z-index:999}
    nav a{color:#ffe4f2;text-decoration:none;margin-left:14px;font-size:14px}
    nav a:hover{color:#f472b6;text-shadow:0 0 10px #f472b6}

    .hero{position:relative;height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
      text-align:center;padding:20px;overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(249,168,212,.2), transparent 40%),
        radial-gradient(circle at 80% 30%, rgba(251,113,133,.2), transparent 40%),
        linear-gradient(180deg,#12050f,#2a0b1e)}
    .glow-ring{position:absolute;width:420px;height:420px;border-radius:50%;
      border:2px solid rgba(249,168,212,.45);filter:blur(2px);animation:pulse 6s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.1);opacity:1}}

    /* glitch neon title */
    .brand-big{
      font-size:3.2em;font-weight:900;letter-spacing:3px;color:#f472b6;position:relative;
      text-shadow:0 0 25px rgba(249,168,212,.9),0 0 60px rgba(251,113,133,.5);
      animation: glowIn 1.2s ease-out both;
    }
    .brand-big::before,.brand-big::after{
      content:attr(data-text);position:absolute;left:0;top:0;width:100%;overflow:hidden;clip-path:inset(0 0 50% 0)
    }
    .brand-big::before{color:#ff5fb3;transform:translate(2px,-2px);animation: glitch 2s infinite linear alternate}
    .brand-big::after{color:#ff9ad5;transform:translate(-2px,2px);animation: glitch 1.5s infinite linear alternate}
    @keyframes glitch{
      0%{clip-path:inset(0 0 80% 0)}20%{clip-path:inset(10% 0 60% 0)}
      40%{clip-path:inset(40% 0 20% 0)}60%{clip-path:inset(20% 0 40% 0)}
      80%{clip-path:inset(60% 0 10% 0)}100%{clip-path:inset(80% 0 0 0)}
    }
    @keyframes glowIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

    .section{padding:110px 20px 80px;max-width:1000px;margin:auto;position:relative;z-index:1}
    h2{text-align:center;margin-bottom:20px;color:#f472b6;text-shadow:0 0 10px rgba(249,168,212,.7)}
    .card{background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04));
      padding:20px;border-radius:16px;box-shadow:0 0 30px rgba(249,168,212,.25)}
    footer{background:#12050f;padding:25px 15px;color:#fbcfe8;display:flex;gap:15px;justify-content:center;flex-wrap:wrap;text-align:center}
    .footer-big{font-size:1.4em;font-weight:800;color:#f472b6;text-shadow:0 0 20px rgba(249,168,212,.7)}
  </style>
</head>
<body>

<header>
  <div style="font-weight:800;color:#f472b6">Website by Sianfrey</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#profil">Profil</a>
    <a href="#pendidikan">Pendidikan</a>
    <a href="#pengalaman">Pengalaman</a>
    <a href="#skill">Skill</a>
    <a href="#quotes">Quotes</a>
  </nav>
</header>

<section id="home" class="hero">
  <div class="glow-ring"></div>
  <div class="brand-big" data-text="WEBSITE BY SIANFREY">WEBSITE BY SIANFREY</div>
  <h1 id="typing"></h1>
</section>

<footer>
  <div class="footer-big">Website ini di buat oleh Riski Kurniawan</div>
  <div class="footer-big">Website by Sianfrey</div>
</footer>

<script>
  // typing
  const text="Halo, saya M. Riski Kurniawan 👋";let i=0;const typingEl=document.getElementById("typing");
  (function typing(){ if(i<text.length){ typingEl.textContent+=text.charAt(i++); setTimeout(typing,70)} })();

  // sakura generator
  setInterval(()=>{
    const s=document.createElement("div");
    s.className="sakura";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(6+Math.random()*6)+"s";
    s.textContent="🌸";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),12000);
  },400);
</script>

</body>
</html>
